<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz - Sara &amp; Dario</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #fff0f4;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
      -webkit-font-smoothing: antialiased;
    }
    .quiz-wrap { width: 100%; max-width: 600px; }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: clamp(22px, 6vw, 28px); font-weight: 700; color: #c94070; letter-spacing: -0.02em; }
    header p  { font-size: clamp(13px, 3.8vw, 14px); color: #a07080; margin-top: 4px; }
    .progress-bar-bg { height: 6px; background: #f5c0d0; border-radius: 999px; margin-bottom: 1.25rem; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: #D4537E; transition: width 0.4s ease; }
    .step-indicator { font-size: clamp(12px, 3.5vw, 13px); color: #b08090; margin-bottom: 1rem; }
    .question-card {
      background: #ffffff; border: 1px solid #f5c0d0; border-radius: 16px;
      padding: clamp(1.25rem, 5vw, 1.75rem); margin-bottom: 1rem;
      box-shadow: 0 2px 16px rgba(212, 83, 126, 0.07);
    }
    .q-label { font-size: 11px; color: #D4537E; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 0.6rem; }
    .q-text  { font-size: clamp(16px, 4.4vw, 17px); font-weight: 600; color: #2a1020; line-height: 1.5; margin-bottom: 1.1rem; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt-btn {
      background: #fff8fa; border: 1px solid #f5c0d0; border-radius: 12px;
      padding: 14px 16px; font-size: clamp(15px, 4.2vw, 16px); color: #3a1828; cursor: pointer;
      text-align: left; transition: all 0.15s; font-family: inherit; touch-action: manipulation;
    }
    .opt-btn:hover:not(:disabled) { border-color: #D4537E; background: #fdeef4; }
    .opt-btn.correct { background: #e8f7e8; border-color: #4caf50; color: #1b5e20; font-weight: 700; }
    .opt-btn.wrong   { background: #fdecea; border-color: #e53935; color: #b71c1c; }
    .opt-btn.reveal  { background: #e8f7e8; border-color: #4caf50; color: #2e7d32; opacity: 0.7; }
    .opt-btn:disabled { cursor: default; }
    .nav-row { display: flex; justify-content: flex-end; margin-top: 1rem; }
    .next-btn, .check-btn {
      background: #D4537E; color: #fff; border: none; border-radius: 12px;
      padding: 13px 22px; font-size: clamp(15px, 4.2vw, 16px); font-weight: 700; cursor: pointer;
      font-family: inherit; transition: background 0.15s, opacity 0.3s;
      width: 100%; max-width: 320px; touch-action: manipulation;
    }
    .next-btn:hover, .check-btn:hover { background: #b8375f; }
    .next-btn { opacity: 0; pointer-events: none; }
    .next-btn.show { opacity: 1; pointer-events: all; }
    .drag-instruction { font-size: clamp(14px, 3.8vw, 14px); color: #7a5060; margin-bottom: 1.1rem; line-height: 1.6; }
    .photo-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .photo-card {
      width: clamp(96px, 28vw, 120px); height: clamp(96px, 28vw, 120px);
      background: #fff8fa; border: 1.5px solid #f5c0d0; border-radius: 12px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: grab; user-select: none; transition: all 0.15s; touch-action: none;
    }
    .photo-card:hover { border-color: #D4537E; }
    .photo-card.dragging { opacity: 0.35; transform: scale(0.96); }
    .photo-card.drag-over { border-color: #D4537E; border-width: 2px; background: #fdeef4; }
    .photo-num { font-size: clamp(28px, 9vw, 36px); font-weight: 700; color: #c94070; }
    .photo-label { font-size: 11px; color: #b08090; margin-top: 4px; }
    .order-label   { font-size: 13px; color: #b08090; margin-bottom: 0.6rem; }
    .order-display { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .order-slot {
      width: 50px; height: 50px; background: #fff0f4; border: 1px solid #f5c0d0;
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #c94070;
    }
    .order-arrow { font-size: 16px; color: #d4a0b0; }
    .drag-result {
      font-size: 15px; font-weight: 600; margin-top: 1rem;
      padding: 13px 18px; border-radius: 12px; display: none;
    }
    .drag-result.correct { background: #e8f7e8; color: #1b5e20; border: 1px solid #81c784; }
    .drag-result.wrong   { background: #fdecea; color: #b71c1c; border: 1px solid #e57373; }
    .score-card {
      background: #ffffff; border: 1px solid #f5c0d0; border-radius: 16px;
      padding: clamp(1.75rem, 6vw, 2.5rem) clamp(1.25rem, 5vw, 2rem);
      text-align: center; box-shadow: 0 2px 16px rgba(212, 83, 126, 0.08);
    }
    .score-heart { font-size: clamp(44px, 12vw, 52px); margin-bottom: 0.6rem; }
    .score-title { font-size: clamp(20px, 5.8vw, 24px); font-weight: 700; color: #2a1020; margin-bottom: 0.25rem; }
    .score-sub   { font-size: clamp(14px, 4.2vw, 15px); color: #7a5060; margin-bottom: 1.25rem; line-height: 1.5; }
    .score-num   { font-size: clamp(46px, 14vw, 64px); font-weight: 800; color: #D4537E; line-height: 1; }
    .score-total { font-size: clamp(14px, 4.2vw, 16px); color: #a07080; margin-top: 4px; margin-bottom: 1.2rem; }
    .score-breakdown {
      background: #fff8fa; border: 1px solid #f5c0d0; border-radius: 12px;
      padding: 1rem 1.25rem; margin-bottom: 1.25rem; text-align: left;
    }
    .breakdown-title { font-size: 11px; font-weight: 800; color: #D4537E; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.8rem; }
    .breakdown-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 1px solid #f5c0d0;
      font-size: clamp(13px, 3.8vw, 14px); color: #5a3040;
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-label { color: #7a5060; }
    .breakdown-val   { font-weight: 800; color: #c94070; font-size: clamp(14px, 4.2vw, 15px); }
    .breakdown-total-row { margin-top: 4px; padding-top: 12px; border-top: 2px solid #f5c0d0; border-bottom: none; }
    .breakdown-total-row .breakdown-label { font-weight: 800; color: #2a1020; font-size: clamp(14px, 4.2vw, 15px); }
    .breakdown-total-row .breakdown-val { font-size: clamp(16px, 5vw, 18px); }
    .leaderboard-card {
      background: #ffffff; border: 1px solid #f5c0d0; border-radius: 16px;
      padding: clamp(1.25rem, 5vw, 1.75rem); margin-top: 1.25rem;
      box-shadow: 0 2px 16px rgba(212, 83, 126, 0.07);
    }
    .lb-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
    .lb-title { font-size: clamp(16px, 4.5vw, 18px); font-weight: 700; color: #2a1020; }
    .lb-empty { color: #b08090; font-size: 14px; text-align: center; padding: 1rem 0; }
    .lb-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid #f9dce6;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row.me { background: #fff0f4; border-radius: 10px; padding: 12px 10px; margin: 0 -10px; }
    .lb-rank {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
      background: #f5c0d0; color: #c94070;
    }
    .lb-rank.gold   { background: #ffeaa0; color: #856a00; }
    .lb-rank.silver { background: #e4e4e4; color: #555; }
    .lb-rank.bronze { background: #f5d5b8; color: #7a4a1e; }
    .lb-name { flex: 1; font-size: clamp(14px, 4vw, 15px); font-weight: 600; color: #2a1020; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-name .me-badge { font-size: 10px; background: #D4537E; color: #fff; border-radius: 6px; padding: 2px 7px; margin-left: 7px; font-weight: 700; vertical-align: middle; }
    .lb-score { font-size: clamp(15px, 4.2vw, 17px); font-weight: 800; color: #D4537E; flex-shrink: 0; }
    .lb-max   { font-size: 11px; color: #b08090; font-weight: 400; }
    .lb-pct   { font-size: 12px; color: #a07080; flex-shrink: 0; min-width: 40px; text-align: right; }
    .lb-loading { text-align: center; padding: 1rem 0; color: #b08090; font-size: 14px; }
    .lb-error   { text-align: center; padding: 1rem 0; color: #b71c1c; font-size: 13px; }
    .lb-refresh-btn {
      display: block; margin: 0.75rem auto 0; background: none; border: 1px solid #f5c0d0;
      border-radius: 10px; color: #D4537E; font-size: 13px; font-weight: 600; padding: 8px 18px;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .lb-refresh-btn:hover { background: #fdeef4; }
    @media (max-width: 380px) {
      body { padding: 1.25rem 0.75rem 2rem; }
      .order-slot { width: 44px; height: 44px; font-size: 20px; }
    }
    @media (min-width: 768px) {
      .next-btn, .check-btn { width: auto; }
    }
  </style>
</head>
<body>
<div class="quiz-wrap" id="app"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDiBDGswzn5mhW050H-RctupNLZfmLUAbI",
    authDomain: "quiz-classifica.firebaseapp.com",
    databaseURL: "https://quiz-classifica-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "quiz-classifica",
    storageBucket: "quiz-classifica.firebasestorage.app",
    messagingSenderId: "941493591669",
    appId: "1:941493591669:web:5cc48856847ac4911ce23c"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db = getDatabase(fbApp);

  window._fbSaveScore = async function(name, score) {
    const key = name.trim().toLowerCase().replace(/[^a-z0-9]/g, '_').substring(0, 40);
    await set(ref(db, 'leaderboard/' + key), {
      name: name,
      score: score,
      ts: Date.now()
    });
  };

  window._fbLoadLeaderboard = async function() {
    const snap = await get(ref(db, 'leaderboard'));
    if (!snap.exists()) return [];
    return Object.values(snap.val()).sort((a, b) => b.score - a.score || a.ts - b.ts);
  };

  window._firebaseReady = true;
  if (window._onFirebaseReady) window._onFirebaseReady();
</script>

<script>
  var questions = [
    { text: "Chi ha detto 'Ti amo' per la prima volta?", options: ["Sara", "Dario"], answer: "Dario" },
    { text: "Chi direbbe 'facciamo una lista' prima di qualsiasi cosa?", options: ["Sara", "Dario"], answer: "Sara" },
    { text: "Chi e' piu' disordinato?", options: ["Sara", "Dario"], answer: "Sara" },
    { text: "Chi dei due catturerebbe piu' Pokemon ma si dimenticherebbe di salvare il gioco?", options: ["Sara", "Dario"], answer: "Dario" },
    { text: "Chi dei due e' piu' testardo?", options: ["Sara", "Dario"], answer: "Sara" },
    { text: "Chi e' che mostra piu' affetto?", options: ["Sara", "Dario"], answer: "Dario" },
    { text: "A quale appuntamento c'e' stato il primo bacio?", options: ["Quinto appuntamento", "Terzo appuntamento", "Quarto appuntamento"], answer: "Quinto appuntamento" },
    { text: "Quale e' stato il primo regalo di anniversario che Dario ha fatto a Sara?", options: ["Cornice con un gatto", "Gioco delle freccette", "Puzzle di Giratina"], answer: "Gioco delle freccette" },
    { text: "Chi e'/sono la/e prima/e persona/e che Sara ha conosciuto della vita di Dario?", options: ["Betta (la sua migliore amica)", "Matt (ex barista del pub Sam)", "I suoi genitori (mentre lui era in bagno col phon)"], answer: "Matt (ex barista del pub Sam)" },
    { text: "Chi e' il vero amore di Sara?", options: ["Dario", "Federico II di Svevia", "Tigro"], answer: "Tigro" },
    { text: "Chi e' il vero amore di Dario?", options: ["Luca S.", "Alessandro L.", "Sara"], answer: "Luca S." }
  ];

  var CORRECTORDER = [3, 1, 4, 2];
  var MAX_SCORE = questions.length + CORRECTORDER.length;
  var currentQ = 0, score = 0, photoScore = 0;
  var answered = false, photoOrder = [1,2,3,4], dragSrc = null;
  var tableName = '', hasStarted = false;
  var app = document.getElementById('app');

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function waitFirebase(cb) {
    if (window._firebaseReady) { cb(); }
    else { window._onFirebaseReady = cb; }
  }

  function render() {
    if (!hasStarted) renderIntro();
    else if (currentQ < questions.length) renderQuestion();
    else if (currentQ === questions.length) renderDrag();
    else renderScore();
  }

  function renderIntro() {
    app.innerHTML =
      '<header><h1>Sara &amp; Dario</h1><p>Quanto li conosci?</p></header>' +
      '<div class="question-card">' +
        '<div class="q-label">Benvenuto</div>' +
        '<div class="q-text">Inserisci il nome del tuo tavolo per iniziare.</div>' +
        '<div style="display:flex;gap:10px;margin-top:10px;align-items:center;flex-wrap:wrap;">' +
          '<input id="tableInput" type="text" placeholder="Es. Tavolo Girasole" ' +
            'style="flex:1 1 220px;min-width:200px;padding:14px 16px;border-radius:12px;border:1px solid #f5c0d0;background:#fff8fa;font-size:16px;color:#3a1828;font-family:inherit;" />' +
          '<button class="next-btn show" onclick="startQuiz()" style="max-width:260px;">Inizia &rarr;</button>' +
        '</div>' +
        '<div id="tableError" style="color:#b71c1c;font-size:13px;margin-top:8px;display:none;">Inserisci un nome valido.</div>' +
      '</div>' +
      '<div id="lb-wrap"></div>';
    waitFirebase(function(){ loadLeaderboard('lb-wrap', null); });
    setTimeout(function() {
      var inp = document.getElementById('tableInput');
      if (inp) {
        inp.focus();
        inp.addEventListener('keydown', function(e){ if(e.key==='Enter') startQuiz(); });
      }
    }, 0);
  }

  window.startQuiz = function() {
    var inp = document.getElementById('tableInput');
    var err = document.getElementById('tableError');
    var val = inp && inp.value ? inp.value.trim() : '';
    if (!val) { if(err) err.style.display='block'; return; }
    tableName = val;
    hasStarted = true;
    currentQ = 0; score = 0; photoScore = 0;
    answered = false; photoOrder = [1,2,3,4];
    render();
  };

  function headerHtml() {
    return '<header><h1>Sara &amp; Dario</h1><p>Quanto li conosci?</p>' +
      (tableName ? '<p style="margin-top:6px;font-size:13px;color:#7a5060;"><strong>Tavolo:</strong> ' + esc(tableName) + '</p>' : '') +
      '</header>';
  }

  function renderQuestion() {
    var q = questions[currentQ];
    var total = questions.length + 1;
    var progress = (currentQ / total) * 100;
    var opts = q.options.map(function(o){
      return '<button class="opt-btn" onclick="choose(\'' + o.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\')">' + esc(o) + '</button>';
    }).join('');
    var nextLabel = currentQ < questions.length - 1 ? 'Prossima domanda &rarr;' : 'Ultima sfida &rarr;';
    app.innerHTML =
      headerHtml() +
      '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + progress + '%"></div></div>' +
      '<div class="step-indicator">Domanda ' + (currentQ+1) + ' di ' + total + '</div>' +
      '<div class="question-card">' +
        '<div class="q-label">Indovina chi!</div>' +
        '<div class="q-text">' + esc(q.text) + '</div>' +
        '<div class="options">' + opts + '</div>' +
      '</div>' +
      '<div class="nav-row"><button class="next-btn" id="nextBtn" onclick="nextQ()">' + nextLabel + '</button></div>';
    answered = false;
  }

  window.choose = function(opt) {
    if (answered) return;
    answered = true;
    var correct = questions[currentQ].answer;
    document.querySelectorAll('.opt-btn').forEach(function(b){
      b.disabled = true;
      if (b.textContent.trim() === correct) b.classList.add(b.textContent.trim() === opt ? 'correct' : 'reveal');
      else if (b.textContent.trim() === opt) b.classList.add('wrong');
    });
    if (opt === correct) score++;
    document.getElementById('nextBtn').classList.add('show');
  };

  window.nextQ = function() { currentQ++; render(); };

  function renderDrag() {
    var total = questions.length + 1;
    var progress = (questions.length / total) * 100;
    app.innerHTML =
      headerHtml() +
      '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + progress + '%"></div></div>' +
      '<div class="step-indicator">Domanda ' + total + ' di ' + total + '</div>' +
      '<div class="question-card">' +
        '<div class="q-label">Metti in ordine</div>' +
        '<div class="q-text">Ordina le foto dalla pi\u00f9 antica alla pi\u00f9 recente.</div>' +
        '<div class="drag-instruction">Sul retro di ogni foto c\'e\' un numero da 1 a 4. Trascina le carte per riordinarle in ordine cronologico. Ogni foto nella posizione giusta vale 1 punto.</div>' +
        '<div class="photo-grid" id="photoGrid"></div>' +
        '<div class="order-label">Il tuo ordine:</div>' +
        '<div class="order-display" id="orderDisplay"></div>' +
        '<button class="check-btn" id="checkBtn" onclick="checkOrder()">Conferma ordine</button>' +
        '<div class="drag-result" id="dragResult"></div>' +
      '</div>';
    photoOrder = [1,2,3,4];
    renderPhotos();
  }

  function renderPhotos() {
    var grid = document.getElementById('photoGrid');
    if (!grid) return;
    grid.innerHTML = photoOrder.map(function(n,i){
      return '<div class="photo-card" draggable="true"' +
        ' ondragstart="dragStart(event,' + i + ')"' +
        ' ondragover="dragOver(event,' + i + ')"' +
        ' ondrop="dropCard(event,' + i + ')"' +
        ' ondragleave="dragLeave(event)"' +
        ' ondragend="dragEnd()">' +
          '<div class="photo-num">' + n + '</div>' +
          '<div class="photo-label">Foto</div>' +
      '</div>';
    }).join('');
    updateOrderDisplay();
  }

  function updateOrderDisplay() {
    var od = document.getElementById('orderDisplay');
    if (!od) return;
    od.innerHTML = photoOrder.map(function(n,i){
      return '<div class="order-slot">' + n + '</div>' +
        (i < photoOrder.length-1 ? '<span class="order-arrow">&rarr;</span>' : '');
    }).join('');
  }

  window.dragStart = function(e,i){ dragSrc=i; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; };
  window.dragEnd   = function(){ document.querySelectorAll('.photo-card').forEach(function(c){ c.classList.remove('dragging','drag-over'); }); };
  window.dragOver  = function(e,i){
    e.preventDefault(); e.dataTransfer.dropEffect='move';
    document.querySelectorAll('.photo-card').forEach(function(c,idx){ idx===i ? c.classList.add('drag-over') : c.classList.remove('drag-over'); });
  };
  window.dragLeave = function(e){ e.currentTarget.classList.remove('drag-over'); };
  window.dropCard  = function(e,i){
    e.preventDefault();
    if (dragSrc===null || dragSrc===i) return;
    var arr=photoOrder.slice(), tmp=arr[dragSrc]; arr[dragSrc]=arr[i]; arr[i]=tmp;
    photoOrder=arr; renderPhotos();
  };

  window.checkOrder = function() {
    var result = document.getElementById('dragResult');
    photoScore = photoOrder.filter(function(n,i){ return n===CORRECTORDER[i]; }).length;
    var isCorrect = photoScore === CORRECTORDER.length;
    result.style.display = 'block';
    result.className = 'drag-result ' + (isCorrect ? 'correct' : 'wrong');
    result.textContent = isCorrect
      ? 'Perfetto! Tutte e 4 le foto al posto giusto! +' + photoScore + ' punti'
      : 'Quasi! ' + photoScore + ' foto su 4 corrette. Ordine giusto: ' + CORRECTORDER.join(' \u2192 ') + '  +' + photoScore + ' punti';
    document.getElementById('checkBtn').disabled = true;
    setTimeout(function(){ currentQ++; render(); }, 2200);
  };

  function renderScore() {
    var totalScore = score + photoScore;
    var pct = Math.round((totalScore / MAX_SCORE) * 100);
    var msg = pct === 100 ? 'Punteggio perfetto! Li conoscete alla perfezione!'
            : pct >= 80  ? 'Ottimo risultato! Vi conoscete davvero bene.'
            : pct >= 50  ? 'Non male! Qualcosa ancora da scoprire...'
            : "Forse \u00e8 il momento di raccontarsi qualcosa in pi\u00f9!";

    app.innerHTML =
      headerHtml() +
      '<div class="score-card">' +
        '<div class="score-heart">&#128149;</div>' +
        '<div class="score-title">Quiz completato!</div>' +
        '<div class="score-sub">' + msg + '</div>' +
        '<div class="score-num">' + totalScore + '</div>' +
        '<div class="score-total">punti su ' + MAX_SCORE + '</div>' +
        '<div class="score-breakdown">' +
          '<div class="breakdown-title">Dettaglio punteggio</div>' +
          '<div class="breakdown-row"><span class="breakdown-label">Domande a risposta multipla</span><span class="breakdown-val">' + score + ' / ' + questions.length + '</span></div>' +
          '<div class="breakdown-row"><span class="breakdown-label">Ordine delle foto</span><span class="breakdown-val">' + photoScore + ' / ' + CORRECTORDER.length + '</span></div>' +
          '<div class="breakdown-row breakdown-total-row"><span class="breakdown-label">Totale</span><span class="breakdown-val">' + totalScore + ' / ' + MAX_SCORE + '</span></div>' +
        '</div>' +
      '</div>' +
      '<div id="lb-wrap"><div class="leaderboard-card"><div class="lb-loading">Salvataggio punteggio...</div></div></div>';

    waitFirebase(function(){
      window._fbSaveScore(tableName, totalScore)
        .then(function(){ loadLeaderboard('lb-wrap', tableName); })
        .catch(function(err){
          document.getElementById('lb-wrap').innerHTML =
            '<div class="leaderboard-card"><div class="lb-error">Errore salvataggio: ' + err.message + '</div></div>';
        });
    });
  }

  function loadLeaderboard(containerId, currentName) {
    var container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML =
      '<div class="leaderboard-card">' +
        '<div class="lb-header"><span style="font-size:22px;">&#127942;</span><span class="lb-title">Classifica tavoli</span></div>' +
        '<div class="lb-loading">Caricamento...</div>' +
      '</div>';

    window._fbLoadLeaderboard()
      .then(function(board){
        var rowsHtml = '';
        if (board.length === 0) {
          rowsHtml = '<div class="lb-empty">Nessun risultato ancora. Siate i primi!</div>';
        } else {
          board.forEach(function(entry, i){
            var rankClass = i===0 ? 'gold' : i===1 ? 'silver' : i===2 ? 'bronze' : '';
            var rankLabel = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : (i+1);
            var isMe = currentName && entry.name.toLowerCase() === currentName.toLowerCase();
            var badge = isMe ? '<span class="me-badge">VOI</span>' : '';
            var pct = Math.round((entry.score / MAX_SCORE) * 100);
            rowsHtml +=
              '<div class="lb-row' + (isMe ? ' me' : '') + '">' +
                '<div class="lb-rank ' + rankClass + '">' + rankLabel + '</div>' +
                '<div class="lb-name">' + esc(entry.name) + badge + '</div>' +
                '<div class="lb-score">' + entry.score + ' <span class="lb-max">/ ' + MAX_SCORE + '</span></div>' +
                '<div class="lb-pct">' + pct + '%</div>' +
              '</div>';
          });
        }
        var nameArg = currentName ? '\'' + currentName.replace(/'/g,"\\'") + '\'' : 'null';
        container.innerHTML =
          '<div class="leaderboard-card">' +
            '<div class="lb-header"><span style="font-size:22px;">&#127942;</span><span class="lb-title">Classifica tavoli</span></div>' +
            rowsHtml +
            '<button class="lb-refresh-btn" onclick="reloadLb(\'' + containerId + '\',' + nameArg + ')">&#8635; Aggiorna classifica</button>' +
          '</div>';
      })
      .catch(function(err){
        container.innerHTML =
          '<div class="leaderboard-card"><div class="lb-error">Errore caricamento classifica: ' + err.message + '</div></div>';
      });
  }

  window.reloadLb = function(id, name) {
    waitFirebase(function(){ loadLeaderboard(id, name); });
  };

  render();
</script>
</body>
</html>
